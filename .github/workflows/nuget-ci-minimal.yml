on:
  workflow_call:
    inputs:
      release_type:
        description: 'rc, stable o vacio'
        required: false
        type: string
        default: ''
      package:
        required: false
        type: string
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - run: echo "release_type=${{ inputs.release_type }}"
